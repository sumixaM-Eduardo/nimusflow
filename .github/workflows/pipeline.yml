name: Pipeline CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Create .env
        run: |
          echo "DATABASE_PATH=data/sales.db" >> .env
          echo "RAW_CSV_PATH=data/raw/sales_sample.csv" >> .env
      - name: Create database
        run: PYTHONPATH=. python -c "from pipeline.database import create_table; create_table()"
      - name: Run tests
        run: PYTHONPATH=. pytest tests/
